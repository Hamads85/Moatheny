name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  XCODE_VERSION: '16.2'
  IOS_DESTINATION: 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
        
      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-
            
      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Moatheny/Moatheny.xcodeproj" \
            -scheme "Moatheny"
            
      - name: Build for iOS Simulator
        run: |
          xcodebuild clean build \
            -project "Moatheny/Moatheny.xcodeproj" \
            -scheme "Moatheny" \
            -destination "${{ env.IOS_DESTINATION }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

  ci-success:
    name: CI Pipeline Success
    runs-on: ubuntu-latest
    needs: [build]
    if: success()
    
    steps:
      - name: Pipeline completed successfully
        run: echo "All CI checks passed!"
